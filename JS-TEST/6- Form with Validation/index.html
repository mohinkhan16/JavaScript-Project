<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>form validation</title>
    <style>
        body {
    font-family: 'Segoe UI', sans-serif;
    background: #fde2e4;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

form {
    background: #fff;
    padding: 30px;
    border-radius: 15px;
    width: 280px;
    text-align: center;
}

h1 {
    color: #9d4edd;
    margin-bottom: 15px;
}

input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border: none;
    border-bottom: 2px solid #cdb4db;
    outline: none;
    background: transparent;
    transition: 0.3s;
}

input:focus {
    border-bottom: 2px solid #9d4edd;
}

button {
    width: 100%;
    padding: 10px;
    background: #ff8fab;
    color: white;
    border: none;
    border-radius: 8px;
    margin-top: 10px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #fb6f92;
}

#result {
    margin-top: 12px;
    font-weight: bold;
    color: #d00000;
}
    </style>
</head>
<body>
    <form id="form">
        <h1>Form validation</h1>
        <input type="text"
        id="name"
        placeholder="Enter name"
        required/><br>

         <input type="text"
        id="email"
        placeholder="Enter Email"
        required/><br>

         <input type="password"
        id="password"
        placeholder="Enter password"
        required/><br>

         <input type="text"
        id="age"
        placeholder="Enter age"
        required/><br>

         <input type="number"
        id="number"
        placeholder="Enter Mobile number"
        required/><br>

<button type="submit">Click</button>

<p id="result"></p>

    </form>

<script src="script.js"></script>

</body>
</html>
