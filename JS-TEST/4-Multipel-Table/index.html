<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    body{
    font-family: Arial;
    background-color: #13416e;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}

form{
    background-color: white;
    padding: 20px;
    border-radius: 8px;
    width: 300px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    text-align: center;
}

input{
    width: 100%;
    padding: 8px;
    margin: 10px 0;
}

button{
    padding: 8px 15px;
    cursor: pointer;
}

#result{
    margin-top: 15px;
    text-align: left;
}
</style>
<body>
    <form id="form">
        <h1>Table Genrate</h1>

        <input type="number"
        id="number"
        placeholder="Enter a Number"
        required/>

        <button type="submit" id="submit">Click</button>

<p id="result"></p>

    </form>
    
    <script src="Script.js"></script>
</body>
</html>
