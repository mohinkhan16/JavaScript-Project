<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Odd-Even</title>
    <style>
        body {
    font-family: Arial, sans-serif;
    background: linear-gradient(to right, #667eea, #764ba2);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    margin: 0;
}

form {
    background: white;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    text-align: center;
    width: 300px;
}

h1 {
    margin-bottom: 20px;
    color: #333;
}

label {
    display: block;
    margin-bottom: 8px;
    font-weight: bold;
}

input {
    width: 100%;
    padding: 10px;
    border: 2px solid #ccc;
    border-radius: 8px;
    margin-bottom: 15px;
    outline: none;
    transition: 0.3s;
}

input:focus {
    border-color: #667eea;
}

button {
    width: 100%;
    padding: 10px;
    border: none;
    background: #667eea;
    color: white;
    font-size: 16px;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #5a67d8;
}

#result {
    margin-top: 15px;
    font-size: 18px;
    color: #333;
}
    </style>
</head>
<body>
    <form id="form">
        <h1>Odd-Even Checker</h1>

        <label>Enter a number</label>
        <input 
        type="number"
        id="number"
        placeholder="Enter a number"
        required/>

        <button type="submit">Click</button>

        <p id="result"></p>
    
    </form>


<script src="Script.js"></script>
</body>
</html>
