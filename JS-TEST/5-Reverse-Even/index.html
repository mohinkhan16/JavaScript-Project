<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REverse Number</title>
    <style>
        body {
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
    text-align: center;
    margin-top: 100px;
}

h1 {
    color: #38bdf8;
    margin-bottom: 20px;
}

input {
    padding: 10px;
    width: 220px;
    border: 2px solid #38bdf8;
    border-radius: 8px;
    background: transparent;
    color: white;
    outline: none;
}

input::placeholder {
    color: #94a3b8;
}

input:focus {
    border-color: #22d3ee;
}

button {
    padding: 10px 18px;
    margin-left: 10px;
    background: #38bdf8;
    color: black;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

button:hover {
    background: #0ea5e9;
}

#result {
    margin-top: 20px;
    font-size: 18px;
    color: #facc15;
}
    </style>
</head>
<body>
    <form id="form">

        <h1>Reverse Even Number</h1>

        <input
        type="number"
        id="number"
        placeholder="Enter a number"
        required/>

        <button type="submit">Click</button>

        <p id="result"></p>
    </form>

<script src="script.js"></script>

</body>
</html>
