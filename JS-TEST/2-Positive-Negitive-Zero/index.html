<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Positive-Negitive-Zero</title>
    <style>
        body {
    font-family: Arial, sans-serif;
    background: linear-gradient(to right, #43cea2, #185a9d);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    margin: 0;
}

form {
    background: #fff;
    padding: 30px;
    border-radius: 15px;
    width: 320px;
    text-align: center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

h1 {
    margin-bottom: 20px;
    color: #333;
}

label {
    display: block;
    margin-bottom: 8px;
    font-weight: bold;
}

input {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: 2px solid #ccc;
    margin-bottom: 15px;
    outline: none;
    transition: 0.3s;
}

input:focus {
    border-color: #43cea2;
}

button {
    width: 100%;
    padding: 10px;
    border: none;
    border-radius: 8px;
    background: #43cea2;
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #2bbf9c;
}

#result {
    margin-top: 15px;
    font-size: 18px;
    font-weight: bold;
}
    </style>
</head>
<body>
    <form id="form">
        <h1>Positive-Negitive-Zero</h1>
        <label>Enter your number</label>

        <input
        type="number"
        placeholder="Enter your number"
        id="number"
        required/>

        <button type="submit">click</button>

        <p id="result"></p>

    </form>

<script src="script.js"></script>
</body>
</html>
