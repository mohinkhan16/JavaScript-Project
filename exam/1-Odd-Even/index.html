
<html>
<head>
  <title>Odd-Even Number checker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <h1>odd-even Checker</h1>

  <form id="form">
    <label for="number">Enter your Number</label><br><br>

    <input type="number" id="number" placeholder="Enter a number" required>
    <br><br>

    <button type="submit">Check</button>
  </form>

  <p id="result"></p>
</div>

<script src="script.js"></script>
</body>
</html>
