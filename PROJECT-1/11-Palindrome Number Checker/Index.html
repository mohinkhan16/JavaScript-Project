<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Palindrome Number Checker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>Palindrome Number Checker</h1>

  <form id="form">

    <label for="number">Enter a Number</label><br><br>

    <input type="number" id="number" placeholder="Enter a number" required>

    <br><br>

    <button type="submit">Check</button>
  </form>

  <p id="result"></p>
</div>

<script src="script.js"></script>
</body>
</html>
