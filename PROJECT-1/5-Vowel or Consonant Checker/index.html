<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vowel or Consonant Checker</title>
    <link rel="stylesheet" href="VC.css">
</head>
<body>
    

<div class="form-container">

  <div class="logo-container">Vowel / Consonant</div>

  <form class="form" id="form">

    <div class="form-group">
      <label for="Alphabet">Enter Alphabet</label>
      <input
        required
        placeholder="Enter one alphabet"
        name="alphabet"
        id="Alphabet"
        type="text"
        maxlength="1"
      />
    </div>

    <button type="submit" class="form-submit-btn">Check</button>

    <p id="result"></p>
    

  </form>
  

</div>

<script src="VC.js"></script>
</body>
</html>
