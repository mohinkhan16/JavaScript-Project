<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Largest Number</title>
    <link rel="stylesheet" href="LN.css">
</head>
<body>

<div class="container">
    <div class="form_area">
        <p class="title">LARGEST NUMBER</p>

        <form id="form">

            <div class="form_group">
                <label class="sub_title">First Number</label>
                <input 
                    type="number"
                    id="firstnumber"
                    placeholder="Enter First Number"
                    class="form_style"
                    required
                >
            </div>

            <div class="form_group">
                <label class="sub_title">Second Number</label>
                <input 
                    type="number"
                    id="secoundnumber"
                    placeholder="Enter Second Number"
                    class="form_style"
                    required
                >
            </div>

            <div class="form_group">
                <label class="sub_title">Third Number</label>
                <input 
                    type="number"
                    id="thirdnumber"
                    placeholder="Enter Third Number"
                    class="form_style"
                    required
                >
            </div>

            <button type="submit" class="btn">CHECK</button>

            <div id="result"></div>

        </form>
    </div>
</div>

<script src="LN.js"></script>

</body>
</html>
