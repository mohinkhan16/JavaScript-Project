<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <form class="form" id="form">

        <p class="form-title">BMI Calculator</p>

        <div class="input-container">
            <input type="number" id="weight" placeholder="Enter weight (kg)" required>
            <input type="number" id="height" placeholder="Enter height (cm)" required>
        </div>

        <button class="submit" type="submit">Check BMI</button>

        <p id="result"></p>

    </form>
</div>

<script src="script.js"></script>
</body>
</html>
